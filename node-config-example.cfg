# =============================================
# SC Node Configuration File (Example)
# =============================================

# =============================================
# AZCOIN
# =============================================
AZCOIN_TARGET_CONFIG=/etc/azcoin/azcoin.conf
AZCOIN_FORMAT=no-spaces

# IP address your node will advertise to the network so other nodes can connect inbound.
# Use your VPN exit IP, VPS public IP, or home public IP here. Update as needed.
AZCOIN_EXTERNALIP=123.45.67.89

# Unique P2P listening port per SC Node for incoming connections from other nodes/peers     -- UNIQUE PER SC NODE --
AZCOIN_PORT=19333

# Force persistent outbound connection to specific trusted peer(s)
AZCOIN_ADDNODE=azcoin-seed.satoshiware.org

# Control network/internet traffic during IBD; disables all other p2p connections
# Leave empty to comment out in target file
AZCOIN_CONNECT=

# Use more RAM (e.g. 4096 to 8192) to speed up IBD
AZCOIN_DBCACHE=3072

# Set to 1 to skip transaction relay during IBD → much faster sync
AZCOIN_BLOCKSONLY=0

# =============================================
# BITCOIN
# =============================================
BITCOIN_TARGET_CONFIG=/etc/bitcoin/bitcoin.conf
BITCOIN_FORMAT=no-spaces

# Control network/internet traffic during IBD; disables all other p2p connections
# Leave empty to comment out in target file
BITCOIN_CONNECT=

# Use more RAM (e.g. 8192 to 16384) to speed up IBD
BITCOIN_DBCACHE=6144

# Set to 1 to skip transaction relay during IBD → much faster sync
BITCOIN_BLOCKSONLY=0

# =============================================
# STRATUM-BITCOIN
# =============================================
STRATUM_BITCOIN_TARGET_CONFIG=/etc/stratum/stratum-bitcoin.toml
STRATUM_BITCOIN_FORMAT=toml

# Bitcoin Stratum Server
STRATUM_BITCOIN_ADDRESS=btc.stratum.example.com

# Bitcoin Stratum Server's Noise Protocol Public Key
STRATUM_BITCOIN_AUTHORITY_PUBKEY=32-byte-binary-public-key-xxxx

# =============================================
# STRATUM-AZCOIN
# =============================================
STRATUM_AZCOIN_TARGET_CONFIG=/etc/stratum/stratum-azcoin.toml
STRATUM_AZCOIN_FORMAT=toml

# AZCoin Stratum Server
STRATUM_AZCOIN_ADDRESS=azc.stratum.example.com

# AZCoin Stratum Server's Noise Protocol Public Key
STRATUM_AZCOIN_AUTHORITY_PUBKEY=32-byte-binary-public-key-xxxx

# =============================================
# WIREGUARD
# =============================================
WIREGUARD_TARGET_CONFIG=/etc/wireguard/wg-client.conf
WIREGUARD_FORMAT=spaces

# Unique WireGuard tunnel IP (MUST be unique across all clients)                            -- UNIQUE PER SC NODE --
WIREGUARD_ADDRESS=10.66.66.123/32

# Server's WireGuard public key
WIREGUARD_PUBLICKEY=ServerPublicKeyHere1234567890abcdef

# Server's domain name + WireGuard port (default = 51820)
WIREGUARD_ENDPOINT=server.example.com:51820


# Symmetric secret (PSK) shared uniquely between ONE client & server for extra security     -- UNIQUE PER SC NODE --
WIREGUARD_PRESHAREDKEY=PreSharedKeyHere1234567890abcdef

