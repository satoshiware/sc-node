services:
  azcoin-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Wire API to core service inside the docker network.
      - AZ_RPC_URL=http://azcoin-core:${AZ_RPC_PORT:-19332}
      - AZ_RPC_USER=${AZ_RPC_USER}
      - AZ_RPC_PASSWORD=${AZ_RPC_PASSWORD}
      # Bitcoin RPC: cookie auth (preferred); fallback to user/pass for remote nodes.
      - BTC_RPC_URL=http://bitcoin-core:${BTC_RPC_PORT:-8332}
      - BTC_RPC_COOKIE_FILE=/run/bitcoin-rpc/.cookie
    ports:
      - "8080:8080"
    volumes:
      - bitcoin_rpc_cookie:/run/bitcoin-rpc:ro
    restart: unless-stopped
    networks:
      - aznet
    depends_on:
      azcoin-core:
        condition: service_healthy
      bitcoin-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8080/v1/health', timeout=2).read(); sys.exit(0)\"",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  azcoin-core:
    image: ${AZCOIN_CORE_IMAGE:-ghcr.io/satoshiware/azcoin-node:latest}
    restart: unless-stopped
    networks:
      - aznet
    environment:
      - AZ_RPC_PORT=${AZ_RPC_PORT:-19332}
      - AZ_RPC_USER=${AZ_RPC_USER}
      - AZ_RPC_PASSWORD=${AZ_RPC_PASSWORD}
    volumes:
      - azcoin-core-data:/data
    command:
      - "-datadir=/data"
      - "-printtoconsole"
      - "-server=1"
      - "-rpcbind=0.0.0.0"
      - "-rpcallowip=172.16.0.0/12"
      - "-rpcallowip=192.168.0.0/16"
      - "-rpcallowip=10.0.0.0/8"
      - "-rpcuser=${AZ_RPC_USER}"
      - "-rpcpassword=${AZ_RPC_PASSWORD}"
      - "-rpcport=${AZ_RPC_PORT:-19332}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v azcoin-cli >/dev/null 2>&1; then azcoin-cli -datadir=/data -rpcconnect=127.0.0.1 -rpcport=$${AZ_RPC_PORT:-19332} -rpcuser=$${AZ_RPC_USER} -rpcpassword=$${AZ_RPC_PASSWORD} getblockchaininfo >/dev/null 2>&1; elif command -v bitcoin-cli >/dev/null 2>&1; then bitcoin-cli -datadir=/data -rpcconnect=127.0.0.1 -rpcport=$${AZ_RPC_PORT:-19332} -rpcuser=$${AZ_RPC_USER} -rpcpassword=$${AZ_RPC_PASSWORD} getblockchaininfo >/dev/null 2>&1; elif command -v curl >/dev/null 2>&1; then curl -sf -u \"$${AZ_RPC_USER}:$${AZ_RPC_PASSWORD}\" -H 'content-type: text/plain;' --data-binary '{\"jsonrpc\":\"1.0\",\"id\":\"hc\",\"method\":\"getblockchaininfo\",\"params\":[]}' http://127.0.0.1:$${AZ_RPC_PORT:-19332}/ >/dev/null; else exit 1; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  bitcoin-core:
    image: ${BITCOIN_CORE_IMAGE:-bitcoin/bitcoin-core:28.0}
    restart: unless-stopped
    networks:
      - aznet
    environment:
      - BTC_RPC_PORT=${BTC_RPC_PORT:-8332}
    volumes:
      - bitcoin-core-data:/data
      - bitcoin_rpc_cookie:/run/bitcoin-rpc
    command:
      - "-datadir=/data"
      - "-printtoconsole"
      - "-server=1"
      - "-rpcbind=0.0.0.0"
      # Restrict to typical docker network subnets; tighten for production.
      - "-rpcallowip=172.16.0.0/12"
      - "-rpcallowip=192.168.0.0/16"
      - "-rpcallowip=10.0.0.0/8"
      - "-rpccookiefile=/run/bitcoin-rpc/.cookie"
      - "-rpcport=${BTC_RPC_PORT:-8332}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v bitcoin-cli >/dev/null 2>&1; then bitcoin-cli -datadir=/data -rpcconnect=127.0.0.1 -rpcport=$${BTC_RPC_PORT:-8332} -rpccookiefile=/run/bitcoin-rpc/.cookie getblockchaininfo >/dev/null 2>&1; elif command -v curl >/dev/null 2>&1; then COOKIE=$$(cat /run/bitcoin-rpc/.cookie 2>/dev/null) && curl -sf -u \"$$COOKIE\" -H 'content-type: text/plain;' --data-binary '{\"jsonrpc\":\"1.0\",\"id\":\"hc\",\"method\":\"getblockchaininfo\",\"params\":[]}' http://127.0.0.1:$${BTC_RPC_PORT:-8332}/ >/dev/null; else exit 1; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  aznet:
    external: true

volumes:
  azcoin-core-data:
  bitcoin-core-data:
  bitcoin_rpc_cookie:
