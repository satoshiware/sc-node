name: docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          SHA_SHORT="${GITHUB_SHA::7}"
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/azcoin-api:sha-${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/azcoin-api:v${{ steps.meta.outputs.version }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
