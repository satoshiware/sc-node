# =====================================================================
# Custom preseed.cfg for Debian 13 "Trixie" – Headless Minimal Install
# Features: Encrypted LVM + TPM2-only auto-unlock (systemd-cryptenroll + dracut)
#   → Settings finalized in /root/sc-node/late-commands.sh
#
# Key settings:
# - Timezone: UTC
# - Hostname: sc-node
# - Domain: internal
# - User: satoshi (name: Satoshi Nakamoto, password: satashi with sudo privileges)
# - Packages: curl, sudo, tpm2-tss, dracut
# - Fully automatic LUKS-encrypted LVM (erases first disk; unencrypted EFI + /boot)
# - Root login disabled
# - Copies sc-node repo to target in /root/sc-node + runs late-commands.sh
# - Runs /root/sc-node/late-commands.sh for post-install configuration
#
# Encryption & TPM2 flow:
# - Installer creates LUKS on main partition → LVM inside (single root LV)
# - Temporary passphrase during install
# - TPM2 enrollment, dracut/GRUB setup, etc.
#   → handled in /root/sc-node/late-commands.sh
# - Assumes fTPM 2.0 enabled + Secure Boot on (prepped in UEFI)
#
# Debugging late commands: grep preseed-late /var/log/installer/syslog
# - syslog disappears on first boot
# =====================================================================
### Early disk wipe & auto-select first disk
d-i partman/early_command string \
    DISK=$(list-devices disk | head -n1) ; \
    logger -t preseed-early "early_command started - detected disk: $DISK" ; \
    dd if=/dev/zero of=$DISK bs=1M count=500 status=none || logger -t preseed-early "First dd failed on $DISK" ; \
    dd if=/dev/zero of=$DISK bs=512 seek=$(($(blockdev --getsz $DISK) - 2048)) count=2048 status=none || logger -t preseed-early "Second dd failed on $DISK" ; \
    sync ; \
    logger -t preseed-early "early_command finished - setting disk: $DISK" ; \
    debconf-set partman-auto/disk "$DISK" || logger -t preseed-early "debconf-set failed for $DISK"

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string sc-node
d-i netcfg/get_domain string internal
d-i netcfg/wireless_wep string

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock / Timezone
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Crypto passphrase (Wiped later for TPM-only)
d-i partman-crypto/passphrase password SatoshiIsMyWitness123!
d-i partman-crypto/passphrase-again password SatoshiIsMyWitness123!
d-i partman-crypto/confirm boolean true
d-i partman-crypto/confirm_nochanges boolean true
d-i partman-crypto/weak_passphrase boolean true  # Allow weak temp pass

### Partitioning – Guided Encrypted LVM
d-i partman-auto/method string crypto
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic

# Confirmations (harmless redundancy)
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Force UEFI/GPT
d-i partman-efi/non_efi_system boolean true

# Clean UEFI/GPT installs (forces GPT label)
d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt

### Apt setup – Enable network mirror + skip prompts
d-i apt-setup/use_mirror boolean true
d-i apt-setup/cdrom/set-first boolean false

### Disable popularity contest survey (no prompt)
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false

### Finish / Reboot
d-i finish-install/reboot_in_progress note

### Accounts – No root login, user satoshi with sudo
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Satoshi Nakamoto
d-i passwd/username string satoshi
d-i passwd/user-uid string 1000
d-i user-setup/allow-password-weak boolean true
d-i passwd/user-password password satoshi
d-i passwd/user-password-again password satoshi
d-i passwd/user-default-groups string sudo

### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string curl sudo libtss2-esys-3.0.2-0 libtss2-fapi1 libtss2-tctildr0 tpm-udev dracut
d-i pkgsel/install-language-support boolean false

### Custom late commands
# Copies sc-node folder from install media to target /root/sc-node
# Sets sc-node root ownership with full permissions
# Executes late-commands.sh
d-i preseed/late_command string \
    logger -t preseed-late "Starting late commands: Copy sc-node repo, ensure root user & sufficient permissions, and execute late-commands.sh" ; \
    cp -a /cdrom/sc-node /target/root/ || logger -t preseed-late "Copy failed" ; \
    in-target chown -R root:root /root/sc-node || logger -t preseed-late "chown failed" ; \
    in-target chmod -R u=rwx,go=rX /root/sc-node || logger -t preseed-late "chmod failed" ; \
    in-target /root/sc-node/late-commands.sh || logger -t preseed-late "late-commands.sh failed" ; \
    logger -t preseed-late "Late commands completed"